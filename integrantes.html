<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo de Desarrollo</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<header>
    <nav class="navbar">

        <div class="logo">
            <h1>Mochila Interactiva Infantil</h1>
        </div>

        <ul class="menu">
            <li>
    <a href="index.html">
        <img src="imgs/iconos/prototipo.png" alt="Prototipo">
        Prototipo
    </a>
</li>

<li>
    <a href="crud.html">
        <img src="imgs/iconos/inventario.png" alt="Inventario">
        Inventario (CRUD)
    </a>
</li>

<li>
    <a href="integrantes.html" class="activo">
        <img src="imgs/iconos/equipo.png" alt="Equipo">
        Equipo (CRUD)
    </a>
</li>
        </ul>

    </nav>
</header>

<main class="crud-contenedor">

    <!-- FORMULARIO -->
    <section class="formulario-panel">
        <h2>Registrar Nuevo Integrante</h2>

        <form id="formIntegrante">
            <div class="grupo-form">
                <label>Nombre Completo</label>
                <input type="text" id="intNombre" required>
            </div>

            <div class="grupo-form">
                <label>Código</label>
                <input type="text" id="intCodigo" required>
            </div>

            <div class="grupo-form">
                <label>Expediente</label>
                <input type="text" id="intExpediente" required>
            </div>

            <div class="grupo-form">
                <label>Rol</label>
                <input type="text" id="intRol" required>
            </div>

            <button type="submit" class="btn-guardar">
                Guardar Integrante
            </button>
        </form>
    </section>

    <!-- LISTA -->
    <section class="tabla-panel" style="background: transparent; padding: 0; box-shadow: none;">
        <div class="equipo-section">
            <h2>Equipo de Desarrollo</h2>

            <div class="contenedor-integrantes" id="contenedorIntegrantes"></div>
        </div>
    </section>

</main>

<script src="js/principal.js"></script>
<!-- =========================
     MODAL EDITAR INTEGRANTE
========================= -->
<div id="modalEditar" class="modal" style="display:none;">
    <div class="modal-contenido">

        <h2>Editar Integrante</h2>

        <input type="text" id="editNombre" placeholder="Nombre">
        <input type="text" id="editRol" placeholder="Rol">

        <div class="modal-acciones">
            <button onclick="guardarEdicion()" class="btn-guardar">Guardar</button>
            <button onclick="cerrarModal()" class="btn-eliminar">Cancelar</button>
        </div>

    </div>
</div>
<!-- CONTENEDOR DE MENSAJES -->
<div id="mensaje" class="mensaje"></div>
</body>
</html>
