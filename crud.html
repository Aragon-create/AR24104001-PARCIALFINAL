<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Útiles Escolares</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<header>
    <nav class="navbar">

        <div class="logo">
            <h1>Mochila Interactiva Infantil</h1>
        </div>

        <ul class="menu">

            <li>
                <a href="index.html">
                    <img src="imgs/iconos/prototipo.png" alt="Prototipo">
                    Prototipo
                </a>
            </li>

            <li>
                <a href="crud.html" class="activo">
                    <img src="imgs/iconos/inventario.png" alt="Inventario">
                    Inventario (CRUD)
                </a>
            </li>

            <li>
                <a href="integrantes.html">
                    <img src="imgs/iconos/equipo.png" alt="Equipo">
                    Equipo (CRUD)
                </a>
            </li>

        </ul>

    </nav>
</header>

<main class="crud-contenedor">

    <section class="formulario-panel">

        <h2>Registrar Nuevo Elemento</h2>

        <form id="formUtil">

            <div class="grupo-form">
                <label for="nombre">Nombre del elemento</label>

                <input
                    type="text"
                    id="nombre"
                    placeholder="Ejemplo: Cuaderno Cuadriculado">
            </div>

            <div class="grupo-form">
                <label for="emoji">Icono del elemento</label>

                <input
                    type="text"
                    id="emoji"
                    placeholder="📔">
            </div>

            <div class="grupo-form">
                <label for="tipo">Tipo de elemento</label>

                <select id="tipo">

                    <option value="Útil Escolar">
                        Útil Escolar
                    </option>

                    <option value="Distractor">
                        Distractor
                    </option>

                </select>

            </div>

            <div class="grupo-form">
                <label for="puntos">Puntuación</label>

                <input
                    type="number"
                    id="puntos"
                    value="1">
            </div>

            <button type="submit" class="btn-guardar">
                Guardar Registro
            </button>

        </form>

    </section>

    <section class="tabla-panel">

        <h2>Inventario de Útiles Escolares</h2>

        <table>

            <thead>

                <tr>
                    <th>Icono</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Puntos</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody id="tablaUtiles">

            </tbody>

        </table>

    </section>

</main>

<!-- MODAL EDITAR -->

<div class="modal" id="modalEditar">

    <div class="modal-contenido">

        <h2>Editar Registro</h2>

        <input
            type="text"
            id="editarNombre"
            placeholder="Nombre">

        <input
            type="number"
            id="editarPuntos"
            placeholder="Puntos">

        <button
            class="btn-guardar"
            onclick="guardarEdicionUtil()">

            Actualizar

        </button>

        <button
            type="button"
            onclick="cerrarModal('modalEditar')">

            Cancelar

        </button>

    </div>

</div>

<!-- MODAL ELIMINAR -->

<div class="modal" id="modalEliminar">

    <div class="modal-contenido">

        <h2>
            ¿Desea eliminar este registro?
        </h2>

        <p>
            Esta acción no se puede deshacer.
        </p>

        <button
            class="btn-eliminar"
            onclick="confirmarEliminarUtil()">

            Sí, eliminar

        </button>

        <button
            type="button"
            onclick="cerrarModal('modalEliminar')">

            Cancelar

        </button>

    </div>

</div>

<div id="mensaje"></div>

<script src="js/principal.js"></script>

</body>
</html>
